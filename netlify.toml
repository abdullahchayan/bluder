# ============================================================
# netlify.toml — Konfigurasi Keamanan & Performa Bluder Kresna
# Versi: 2.0 (Disempurnakan)
# ============================================================

# ── Build Settings ──────────────────────────────────────────
[build]
  publish = "."

# ── Redirect: root → bluder_kresna.html ─────────────────────
# Halaman index.html (CAPTCHA) tetap sebagai entry point.
# Jika seseorang akses domain langsung, diarahkan ke index.
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# ── Global Security Headers ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]

    # 1. HSTS — paksa HTTPS selama 1 tahun
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # 2. Anti MIME Sniffing
    X-Content-Type-Options = "nosniff"

    # 3. Anti-Clickjacking (SAMEORIGIN agar Google Maps embed bisa jalan)
    X-Frame-Options = "SAMEORIGIN"

    # 4. Referrer Policy
    Referrer-Policy = "strict-origin-when-cross-origin"

    # 5. Permissions Policy — matikan semua fitur sensitif
    Permissions-Policy = "accelerometer=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(self), usb=(), interest-cohort=()"

    # 6. Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; frame-src https://www.google.com https://maps.google.com; connect-src 'self' https://wa.me; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me; frame-ancestors 'none'; upgrade-insecure-requests;"

    # 7. Cross-Origin Policies
    Cross-Origin-Embedder-Policy  = "unsafe-none"
    Cross-Origin-Opener-Policy    = "same-origin"
    Cross-Origin-Resource-Policy  = "cross-origin"

    # 8. XSS Protection (browser lama)
    X-XSS-Protection = "1; mode=block"

    # 9. Cache default (HTML tidak di-cache agresif)
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache Performa: Aset Statis ──────────────────────────────
# CSS, JS, Gambar, Font → cache 1 tahun (immutable)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Halaman HTML: cache pendek + revalidate ──────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Robots-Tag  = "index, follow"

# ── index.html (CAPTCHA) — jangan diindex crawler ───────────
[[headers]]
  for = "/index.html"
  [headers.values]
    X-Robots-Tag  = "noindex, nofollow"
    Cache-Control = "no-store, no-cache"

# ── netlify.toml sendiri — jangan bisa diakses publik ────────
[[headers]]
  for = "/netlify.toml"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
